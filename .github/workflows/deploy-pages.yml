name: Deploy static site to GitHub Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Check JavaScript syntax
        run: find scripts site -type f \( -name '*.js' -o -name '*.mjs' \) -print0 | xargs -0 -n1 node --check
      - name: Setup Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true
      - name: Build static site
        run: node scripts/build-site.mjs
      - name: Check site quality gates
        run: |
          node scripts/quality/check-repo-structure.mjs
          node scripts/quality/check-site.mjs
      - name: Verify generated site is committed
        run: git diff --exit-code -- site
      - name: Prepare public artifact
        run: |
          mkdir -p dist
          cp -R site/. dist/
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: "dist"
          include-hidden-files: true
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
