name: Deploy static site to GitHub Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true
      - name: Prepare public artifact
        run: |
          mkdir -p dist
          cp -R about brands brokercontrol careers case-studies cleanloop company contact developers documentation documents ghostwear industries operating-systems partners press privacy process products projects services soc solutions technology terms trust-center dist/
          cp -R assets dist/
          rm -rf dist/assets/merchandising
          cp CNAME index.html robots.txt script.js site.webmanifest sitemap.xml styles.css dist/
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: "dist"
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
